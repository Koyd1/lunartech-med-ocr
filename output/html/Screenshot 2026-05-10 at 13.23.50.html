<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>de măsură</title>
  <style>
    @page { size: A4; margin: 12mm; }
    body {
      margin: 0;
      background: #f4f5f7;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
    }
    .sheet {
      position: relative;
      width: 630.0px;
      height: 767.7px;
      margin: 24px auto;
      background: #fff;
      box-shadow: 0 1px 8px rgba(15, 23, 42, 0.16);
      overflow: hidden;
    }
    .page-underlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0.95;
      filter: grayscale(1) contrast(1.05);
    }
    .block {
      position: absolute;
      white-space: nowrap;
      line-height: 1.15;
      color: rgba(17, 24, 39, 0.28);
    }
    .heading { font-weight: 700; }
    .field_line { font-weight: 600; }
    .date_line { font-weight: 600; }
    .low-confidence { color: #9f1239; }
    .field-box {
      position: absolute;
      border: 1px solid rgba(37, 99, 235, 0.28);
      background: rgba(219, 234, 254, 0.12);
      box-sizing: border-box;
      pointer-events: none;
    }
    .detected-line {
      position: absolute;
      background: rgba(15, 23, 42, 0.42);
      pointer-events: none;
    }
    .meta {
      max-width: 630.0px;
      margin: 18px auto 0;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <section class="meta">
    OCR: tesseract |
    Mean confidence: 91.14 |
    Source: Screenshot 2026-05-10 at 13.23.50.png
  </section>
  <main class="sheet">
    <img class="page-underlay" src="assets/Screenshot 2026-05-10 at 13.23.50.png" alt="">
    <div class="field-box" title="Data nasterii" style="left:201.2px; top:50.0px; width:254.7px; height:11.2px;"></div>
    <div class="field-box" title="Sânge integral. Metoda" style="left:18.4px; top:207.9px; width:495.4px; height:11.2px;"></div>



  </main>
</body>
</html>
